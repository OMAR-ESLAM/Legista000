<style>
:root {
  --bg: #0A0A0D;
  --bg2: #121217;
  --gold: #D4AF37;
  --gold-soft: #F4E5A6;
  --cyber: #00E5FF;
  --white: #FFFFFF;
  --gray: #8A8A8F;
  --success: #00FFB2;
  --surface: #1A1A22;
  --border: rgba(212,175,55,0.15);
  --accent: var(--cyber); /* changed by JS */
}
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior: smooth; }
body { font-family: 'Cairo', sans-serif; background: var(--bg); color: var(--white); overflow-x: hidden; cursor: none; }

#cursor { position: fixed; width: 12px; height: 12px; background: var(--gold); border-radius: 50%; pointer-events: none; z-index: 9999; transform: translate(-50%,-50%); transition: transform .1s, width .2s, height .2s; mix-blend-mode: screen; }
#cursor-glow { position: fixed; width: 300px; height: 300px; background: radial-gradient(circle, rgba(0,229,255,0.04) 0%, transparent 70%); border-radius: 50%; pointer-events: none; z-index: 9998; transform: translate(-50%,-50%); transition: transform .08s; }

#bg-canvas { position: fixed; inset: 0; z-index: 0; pointer-events: none; }

/* NAV */
nav { position: fixed; top: 16px; left: 50%; transform: translateX(-50%); z-index: 1000; width: calc(100% - 48px); max-width: 1100px; display: flex; align-items: center; justify-content: space-between; padding: 14px 28px; background: rgba(10,10,13,0.6); backdrop-filter: blur(20px); border: 1px solid var(--border); border-radius: 14px; transition: padding .3s; }
nav.scrolled { padding: 10px 24px; box-shadow: 0 8px 32px rgba(0,0,0,0.5); }
.nav-logo { font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 800; letter-spacing: 5px; background: linear-gradient(90deg, var(--gold), var(--gold-soft)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; text-decoration: none; }
.nav-links { display: flex; gap: 32px; }
.nav-links a { font-size: 12px; color: var(--gray); text-decoration: none; letter-spacing: 1px; font-weight: 600; transition: color .2s; }
.nav-links a:hover { color: var(--white); }
.nav-cta { background: transparent; border: 1px solid rgba(212,175,55,0.5); color: var(--gold); padding: 9px 20px; border-radius: 8px; font-family: 'Cairo', sans-serif; font-size: 12px; font-weight: 700; cursor: none; letter-spacing: 1px; position: relative; overflow: hidden; transition: color .25s; text-decoration: none; display: inline-block; }
.nav-cta::before { content:''; position:absolute; inset:0; background:linear-gradient(135deg,var(--gold),#a8891f); transform:scaleX(0); transform-origin:right; transition:transform .3s; z-index:-1; }
.nav-cta:hover { color:#0A0A0D; }
.nav-cta:hover::before { transform:scaleX(1); }

/* PAGE HERO */
.page-hero { padding: 130px 24px 50px; position: relative; z-index: 2; max-width: 1100px; margin: 0 auto; }
.breadcrumb { display: flex; align-items: center; gap: 8px; margin-bottom: 20px; }
.breadcrumb a { font-size: 11px; color: var(--gray); text-decoration: none; letter-spacing: 2px; transition: color .2s; }
.breadcrumb a:hover { color: var(--gold); }
.breadcrumb-sep { font-size: 11px; color: var(--gray); opacity: .4; }
.breadcrumb-cur { font-size: 11px; letter-spacing: 2px; font-weight: 700; }
.breadcrumb-cur.criminal { color: var(--cyber); }
.breadcrumb-cur.civil { color: var(--gold); }

.hero-inner { display: flex; align-items: flex-end; justify-content: space-between; gap: 32px; flex-wrap: wrap; }
.hero-eyebrow { font-size: 10px; letter-spacing: 6px; font-weight: 700; margin-bottom: 12px; opacity: 0.8; }
.hero-eyebrow.criminal { color: var(--cyber); }
.hero-eyebrow.civil { color: var(--gold); }
.hero-h1 { font-size: clamp(28px, 4vw, 52px); font-weight: 900; line-height: 1.1; margin-bottom: 12px; }
.hero-sub { font-size: 14px; color: var(--gray); max-width: 480px; line-height: 1.9; }
.hero-stats { display: flex; gap: 32px; }
.hstat { text-align: center; }
.hstat-num { font-family: 'Syne', sans-serif; font-size: 40px; font-weight: 800; line-height: 1; }
.hstat-num.criminal { color: var(--cyber); }
.hstat-num.civil { color: var(--gold); }
.hstat-lbl { font-size: 10px; letter-spacing: 3px; color: var(--gray); margin-top: 4px; }

/* SEARCH BAR */
.search-bar-wrap { position: relative; z-index: 2; max-width: 1100px; margin: 0 auto; padding: 0 24px 40px; }
.search-bar { display: flex; align-items: center; gap: 12px; background: var(--surface); border: 1px solid rgba(255,255,255,0.08); border-radius: 14px; padding: 14px 20px; transition: border-color .2s; }
.search-bar:focus-within { border-color: rgba(0,229,255,0.3); }
.search-bar.civil-bar:focus-within { border-color: rgba(212,175,55,0.3); }
.search-icon { font-size: 18px; opacity: .5; }
.search-input { flex: 1; background: transparent; border: none; outline: none; font-family: 'Cairo', sans-serif; font-size: 14px; color: var(--white); letter-spacing: 0.5px; }
.search-input::placeholder { color: var(--gray); }
.search-count { font-size: 11px; color: var(--gray); letter-spacing: 2px; white-space: nowrap; }

/* DEFENSES GRID */
.defenses-wrap { position: relative; z-index: 2; max-width: 1100px; margin: 0 auto; padding: 0 24px 80px; }
.defenses-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 16px; }

.defense-card { background: var(--surface); border: 1px solid rgba(255,255,255,0.06); border-radius: 16px; padding: 24px; position: relative; overflow: hidden; transition: border-color .2s, transform .2s; display: flex; flex-direction: column; gap: 12px; }
.defense-card::before { content:''; position:absolute; inset:0; border-radius:16px; pointer-events:none; }
.defense-card.criminal::before { background: radial-gradient(ellipse at top right, rgba(0,229,255,0.04), transparent 60%); }
.defense-card.civil::before { background: radial-gradient(ellipse at top right, rgba(212,175,55,0.04), transparent 60%); }
.defense-card.criminal:hover { border-color: rgba(0,229,255,0.25); transform: translateY(-3px); box-shadow: 0 12px 40px rgba(0,229,255,0.08); }
.defense-card.civil:hover { border-color: rgba(212,175,55,0.3); transform: translateY(-3px); box-shadow: 0 12px 40px rgba(212,175,55,0.08); }
.defense-card.hidden { display: none; }

.defense-num { font-family: 'Syne', sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 3px; position: relative; z-index: 1; }
.defense-num.criminal { color: rgba(0,229,255,0.5); }
.defense-num.civil { color: rgba(212,175,55,0.5); }

.defense-text { font-size: 14px; font-weight: 600; line-height: 1.7; position: relative; z-index: 1; color: rgba(255,255,255,0.9); }

.defense-tag { font-size: 9px; letter-spacing: 2px; padding: 4px 10px; border-radius: 20px; width: fit-content; font-weight: 700; position: relative; z-index: 1; }
.defense-tag.criminal { background: rgba(0,229,255,0.07); color: var(--cyber); border: 1px solid rgba(0,229,255,0.15); }
.defense-tag.civil { background: rgba(212,175,55,0.07); color: var(--gold); border: 1px solid rgba(212,175,55,0.15); }

.section-divider { display: flex; align-items: center; gap: 16px; margin: 40px 0 24px; }
.sd-line { flex: 1; height: 1px; }
.sd-line.criminal { background: linear-gradient(90deg, rgba(0,229,255,0.25), transparent); }
.sd-line.civil { background: linear-gradient(90deg, rgba(212,175,55,0.3), transparent); }
.sd-text { font-size: 10px; letter-spacing: 4px; font-weight: 700; }
.sd-text.criminal { color: var(--cyber); }
.sd-text.civil { color: var(--gold); }

/* NO RESULTS */
.no-results { text-align: center; padding: 60px 20px; color: var(--gray); font-size: 14px; display: none; }
.no-results.show { display: block; }

/* reveal */
.reveal { opacity: 0; transform: translateY(20px); transition: opacity .5s, transform .5s; }
.reveal.visible { opacity: 1; transform: translateY(0); }

footer { position: relative; z-index: 2; padding: 48px 24px; text-align: center; border-top: 1px solid rgba(255,255,255,0.05); }

.back-btn:hover { color: var(--white); border-color: rgba(255,255,255,0.25); background: rgba(255,255,255,0.08); }

@media (max-width: 768px) {

  .hero-inner { flex-direction: column; align-items: flex-start; }
  .nav-links { display: none; }

</style>
</head>

/* ═══════════════════════════════════════════════
   RENDER ENGINE
═══════════════════════════════════════════════ */
function getParam(name) {
  return new URLSearchParams(window.location.search).get(name);
}

function renderSection(sectionKey) {
  const sec = SECTIONS[sectionKey];
  if (!sec) {
    document.getElementById('heroTitle').textContent = 'قسم غير موجود';
    return;
  }
  const type = sec.type;
  const accentColor = type === 'criminal' ? 'var(--cyber)' : 'var(--gold)';

  // breadcrumb
  document.getElementById('breadcrumbCur').textContent = sec.title;
  document.getElementById('breadcrumbCur').className = 'breadcrumb-cur ' + type;

  // hero
  document.getElementById('heroEyebrow').textContent = sec.eyebrow;
  document.getElementById('heroEyebrow').className = 'hero-eyebrow ' + type;
  document.getElementById('heroTitle').textContent = sec.title;
  document.getElementById('heroSub').textContent = sec.sub;

  // search bar
  if (type === 'civil') document.getElementById('searchBar').classList.add('civil-bar');

  // count all defenses
  let total = 0;
  sec.groups.forEach(g => total += g.items.length);
  document.getElementById('totalCount').textContent = total;
  document.getElementById('totalCount').className = 'hstat-num ' + type;
  document.getElementById('searchCount').textContent = total + ' دفع';

  // title
  document.title = 'LEGISTA — ' + sec.title;

  // render cards
  const grid = document.getElementById('defensesGrid');
  let globalIdx = 1;
  sec.groups.forEach(group => {
    // group divider
    const div = document.createElement('div');
    div.className = 'section-divider reveal';
    div.style.gridColumn = '1 / -1';
    div.innerHTML = `<div class="sd-text ${type}">${group.title}</div><div class="sd-line ${type}"></div>`;
    grid.appendChild(div);

    group.items.forEach(item => {
      const card = document.createElement('div');
      card.className = `defense-card ${type} reveal`;
      card.dataset.text = item.toLowerCase();
      card.innerHTML = `
        <div class="defense-num ${type}">${String(globalIdx).padStart(3,'0')}</div>
        <div class="defense-text">${item}</div>
        <div class="defense-tag ${type}">${type === 'criminal' ? 'جنائي' : 'مدني'}</div>
      `;
      grid.appendChild(card);
      globalIdx++;
    });
  });

  // observe reveals
  const observer = new IntersectionObserver(entries => {
    entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); });
  }, { threshold: 0.05 });
  document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
}

/* SEARCH */
document.getElementById('searchInput').addEventListener('input', function() {
  const q = this.value.trim().toLowerCase();
  const cards = document.querySelectorAll('.defense-card');
  let visible = 0;
  cards.forEach(c => {
    const match = !q || c.dataset.text.includes(q);
    c.classList.toggle('hidden', !match);
    if (match) visible++;
  });
  document.getElementById('searchCount').textContent = visible + ' دفع';
  document.getElementById('noResults').classList.toggle('show', visible === 0);
});

/* INIT */
const sectionKey = getParam('section') || 'butlan';
renderSection(sectionKey);

/* cursor */
const cur = document.getElementById('cursor');
const curGlow = document.getElementById('cursor-glow');
document.addEventListener('mousemove', e => {
  cur.style.left = e.clientX + 'px'; cur.style.top = e.clientY + 'px';
  curGlow.style.left = e.clientX + 'px'; curGlow.style.top = e.clientY + 'px';
});
document.querySelectorAll('a').forEach(el => {
  el.addEventListener('mouseenter', () => { cur.style.width='24px'; cur.style.height='24px'; });
  el.addEventListener('mouseleave', () => { cur.style.width='12px'; cur.style.height='12px'; });
});

/* nav scroll */
window.addEventListener('scroll', () => {
  document.getElementById('mainNav').classList.toggle('scrolled', scrollY > 60);
});

/* bg canvas */
const canvas = document.getElementById('bg-canvas');
const ctx = canvas.getContext('2d');
let W, H;
function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
resize(); window.addEventListener('resize', resize);
const streams = Array.from({length: 10}, () => ({
  x: Math.random()*1200, y: Math.random()*-800,
  speed: 0.25+Math.random()*0.35,
  chars: Array.from({length:16}, ()=>String.fromCharCode(0x600+Math.floor(Math.random()*100))),
  opacity: 0.015+Math.random()*0.025
}));
function drawBG() {
  ctx.clearRect(0,0,W,H);
  ctx.strokeStyle='rgba(212,175,55,0.02)'; ctx.lineWidth=0.5;
  for(let x=0;x<W;x+=60){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
  for(let y=0;y<H;y+=60){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
  ctx.font='11px Cairo';
  streams.forEach(s=>{
    ctx.fillStyle=`rgba(0,229,255,${s.opacity})`;
    s.chars.forEach((c,i)=>{if(s.y+i*16>0&&s.y+i*16<H)ctx.fillText(c,s.x%W,s.y+i*16);});
    s.y+=s.speed; if(s.y>H+200){s.y=-300;s.x=Math.random()*W;}
  });
  requestAnimationFrame(drawBG);
}
drawBG();
</script>
